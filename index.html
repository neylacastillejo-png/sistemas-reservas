<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Reservas de Eventos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Sistema de Reservas de Eventos</h1>
      <p>Gestión centralizada de clientes y eventos</p>
    </header>

    <div class="dashboard">
      <!-- FORMULARIO -->
      <section class="card">
        <h2 class="card-title" id="form-title">Nueva Reserva</h2>
        <form id="reservation-form">
          <input type="hidden" id="edit-index" value="-1">

          <div class="form-group">
            <label for="client-name">Nombre del Cliente *</label>
            <input type="text" id="client-name" class="form-control" placeholder="Ej. Ana Gómez" required>
          </div>

          <div class="form-group">
            <label for="event-type">Tipo de Evento *</label>
            <select id="event-type" class="form-control" required>
              <option value="">Seleccione un evento...</option>
              <option value="Boda">Boda</option>
              <option value="Cumpleaños">Cumpleaños</option>
              <option value="Conferencia">Conferencia Corporativa</option>
              <option value="Aniversario">Aniversario</option>
              <option value="Otro">Otro</option>
            </select>
          </div>

          <div class="form-group">
            <label for="event-date">Fecha del Evento *</label>
            <input type="date" id="event-date" class="form-control" required>
          </div>

          <div class="form-group">
            <label for="guest-count">Cantidad de Personas *</label>
            <input type="number" id="guest-count" class="form-control" min="1" placeholder="Ej. 50" required>
          </div>

          <div class="form-group">
            <label for="client-phone">Teléfono de Contacto *</label>
            <input type="tel" id="client-phone" class="form-control" placeholder="Ej. 3001234567" required>
          </div>

          <button type="submit" id="btn-submit" class="btn btn-primary">Guardar Reserva</button>
          <button type="button" id="btn-cancel" class="btn btn-cancel" style="display: none;">Cancelar Edición</button>
        </form>
      </section>

      <!-- LISTADO DE RESERVAS -->
      <section class="card">
        <div class="card-title">
          <span>Reservas Registradas</span>
          <span id="total-count" class="badge">0 Total</span>
        </div>

        <div class="search-box">
          <input type="text" id="search-input" class="form-control" placeholder="🔍 Buscar reserva por cliente...">
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Evento</th>
                <th>Fecha</th>
                <th>Personas</th>
                <th>Teléfono</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="reservations-list"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast">Mensaje de notificación</div>

  <script src="js/app.js"></script>
</body>
</html>
